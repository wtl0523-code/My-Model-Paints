<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>我的模型漆管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        #drawer { transition: transform 0.3s ease-in-out; z-index: 1000; }
        #drawer.closed { transform: translateX(-100%); }
        #drawer-overlay { transition: opacity 0.3s ease-in-out; z-index: 999; }
        .paint-card { transition: all 0.2s ease-in-out; min-height: 180px; }
        .paint-card:hover { transform: translateY(-2px); box-shadow: 0 8px 15px -5px rgba(0, 0, 0, 0.1); }
        
        /* 標籤樣式 */
        .tag-白 { background-color: #ffffff; color: #475569; border: 1px solid #e2e8f0; }
        .tag-土 { background-color: #92400e; color: #ffffff; }
        .tag-黑 { background-color: #0f172a; color: #ffffff; }
        .tag-銀 { background-color: #cbd5e1; color: #1e293b; border: 1px solid #94a3b8; }
        .tag-金 { background-color: #ca8a04; color: #ffffff; }
        .tag-紅 { background-color: #b91c1c; color: #ffffff; }
        .tag-藍 { background-color: #1d4ed8; color: #ffffff; }
        .tag-綠 { background-color: #15803d; color: #ffffff; }
        .tag-灰 { background-color: #475569; color: #ffffff; }
        .tag-黃 { background-color: #facc15; color: #422006; }
        .tag-P { background-color: #ec4899; color: #ffffff; }
        .tag-M { background-color: #8b5cf6; color: #ffffff; }
        .tag-T { background-color: #06b6d4; color: #ffffff; }
        .tag-default { background-color: #94a3b8; color: #ffffff; }

        .fs-swatch { width: 50px; height: 22px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.15); flex-shrink: 0; cursor: pointer; }
        .brand-swatch { width: 36px; height: 18px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.1); margin-left: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #94a3b8; background: #f8fafc; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="drawer-overlay" class="fixed inset-0 bg-black opacity-0 pointer-events-none hidden transition-opacity duration-300"></div>

    <!-- 側邊選單 -->
    <aside id="drawer" class="fixed top-0 left-0 h-full w-72 bg-white shadow-2xl closed overflow-y-auto">
        <div class="p-5 border-b border-slate-100 flex items-center justify-between">
            <h2 class="text-lg font-black text-slate-800">系統選單</h2>
            <button onclick="toggleDrawer()" class="text-slate-400 hover:text-slate-600 p-2">✕</button>
        </div>
        <div class="p-4 space-y-3">
            <button onclick="openAddModal()" class="w-full text-left px-4 py-3 rounded-xl hover:bg-blue-50 text-blue-600 font-bold flex items-center gap-3 transition-colors border border-blue-100 shadow-sm">
                <span class="text-lg">➕</span> 新增單筆漆料
            </button>
            <div class="h-px bg-slate-100 my-2"></div>
            <div class="px-2">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">資料庫管理 (CSV)</p>
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 mb-4">
                    <label class="text-[11px] font-bold text-blue-800 block mb-2">匯入檔案 (覆蓋)</label>
                    <select id="encoding-selector" class="w-full text-xs bg-white border border-blue-200 rounded-lg px-2 py-2 mb-2 outline-none">
                        <option value="utf-8">UTF-8 編碼 (推薦)</option>
                        <option value="big5">Big5 編碼 (Excel)</option>
                    </select>
                    <input type="file" id="csv-upload" accept=".csv" class="hidden">
                    <button onclick="document.getElementById('csv-upload').click()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold text-xs shadow hover:bg-blue-700">選擇 CSV 檔案</button>
                </div>
                <button onclick="exportCSV()" class="w-full text-left px-4 py-2 rounded-xl hover:bg-slate-50 text-slate-700 font-bold flex items-center gap-3 transition-colors border border-slate-100 text-sm">
                    📥 匯出庫存 (備份)
                </button>
            </div>
            <div class="h-px bg-slate-100 my-2"></div>
            <button onclick="clearStorage()" class="w-full text-left px-4 py-2 rounded-xl hover:bg-red-50 text-red-500 font-bold flex items-center gap-3 transition-colors text-sm">
                🗑️ 清空所有資料
            </button>
        </div>
    </aside>

    <main class="max-w-7xl mx-auto p-3 md:p-8">
        <header class="mb-4 flex items-center gap-3">
            <button onclick="toggleDrawer()" class="p-3 bg-white rounded-xl shadow-sm hover:bg-slate-50 border border-slate-200 transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <h1 class="text-xl md:text-2xl font-black text-slate-800">模型漆管理</h1>
        </header>

        <!-- 空狀態 -->
        <div id="welcome-state" class="hidden text-center py-16 bg-white rounded-2xl border border-slate-200 shadow-sm mb-6">
            <div class="text-5xl mb-4">📂</div>
            <h2 class="text-xl font-black text-slate-800 mb-2">資料庫是空的</h2>
            <p class="text-slate-500 text-sm mb-6 px-6">請點擊選單匯入您的「我的模型漆.csv」。</p>
            <button onclick="toggleDrawer()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-black shadow-lg hover:bg-blue-700">
                匯入資料
            </button>
        </div>

        <div id="main-content" class="hidden">
            <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4">
                <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
                    <p class="text-slate-400 text-[9px] font-bold uppercase mb-1">總在庫</p>
                    <p id="total-count" class="text-2xl font-black text-blue-600 leading-none">0</p>
                </div>
                <div id="brand-stats" class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 col-span-1 md:col-span-4 flex items-center overflow-x-auto whitespace-nowrap gap-2 no-scrollbar"></div>
            </div>

            <!-- 搜尋與過濾 -->
            <div class="bg-white p-3 rounded-xl shadow-md border border-slate-100 mb-4 flex flex-col gap-2 sticky top-2 z-10">
                <div class="relative flex-1">
                    <span class="absolute left-3 top-2.5 text-slate-400 text-sm">🔍</span>
                    <input type="text" id="search-input" placeholder="搜尋編號、廠牌..." class="w-full pl-9 pr-3 py-2 text-sm rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex gap-2">
                    <select id="brand-filter" class="flex-1 px-2 py-2 text-xs rounded-lg border border-slate-200 bg-slate-50 font-bold text-slate-700 outline-none">
                        <option value="">所有品牌</option>
                    </select>
                    <select id="color-filter" class="flex-1 px-2 py-2 text-xs rounded-lg border border-slate-200 bg-slate-50 font-bold text-slate-700 outline-none">
                        <option value="">所有分類</option>
                    </select>
                </div>
            </div>

            <div id="paint-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"></div>
            <div id="empty-state" class="hidden text-center py-20">
                <p class="text-slate-400 text-sm font-medium">沒有找到相符的漆料</p>
            </div>
        </div>
    </main>

    <input type="color" id="global-color-picker" style="position: absolute; left: -9999px; opacity: 0; width: 1px; height: 1px;">

    <!-- 新增 Modal -->
    <div id="add-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-[2000]">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="text-lg font-black text-slate-800">新增漆料</h3>
                <button onclick="closeAddModal()" class="text-slate-400 hover:text-slate-600 text-xl">✕</button>
            </div>
            <form id="add-paint-form" class="p-5 space-y-3 overflow-y-auto max-h-[75vh]">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 block mb-1">廠牌*</label>
                        <input name="brand" list="brand-list" required placeholder="選擇或輸入" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                        <datalist id="brand-list"></datalist>
                    </div>
                    <div><label class="text-[11px] font-bold text-slate-500 block mb-1">編號*</label><input name="code" required placeholder="XF-1" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"></div>
                </div>
                <div><label class="text-[11px] font-bold text-slate-500 block mb-1">名稱*</label><input name="name" required class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="text-[11px] font-bold text-slate-500 block mb-1">用途</label><input name="usage" placeholder="例如：飛機蒙皮" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-[11px] font-bold text-slate-500 block mb-1">分類</label><select name="colorFamily" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none"><option value="灰">灰</option><option value="土">土</option><option value="白">白</option><option value="黑">黑</option><option value="銀">銀</option><option value="金">金</option><option value="藍">藍</option><option value="紅">紅</option><option value="綠">綠</option><option value="黃">黃</option><option value="P">底漆</option><option value="M">溶劑</option><option value="T">工具</option><option value="其他">其他</option></select></div>
                    <div><label class="text-[11px] font-bold text-slate-500 block mb-1">數量</label><input name="qty" type="number" value="1" min="0" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"></div>
                </div>
                <div><label class="text-[11px] font-bold text-slate-500 block mb-1">標準色號 (FSXXXXX)</label><input name="stdColor" placeholder="FS36231" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"></div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black shadow hover:bg-blue-700 transition-all mt-2 active:scale-95">確定新增</button>
            </form>
        </div>
    </div>

        let savedColors = JSON.parse(localStorage.getItem(COLOR_CACHE_KEY)) || {};
        let colorCache = { ...defaultColorCache, ...savedColors };

        function parseCSV(text) {
            const result = []; let row = []; let cell = ""; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let char = text[i]; let next = text[i+1];
                if (inQuotes) {
                    if (char === '"' && next === '"') { cell += '"'; i++; } 
                    else if (char === '"') inQuotes = false; 
                    else cell += char; 
                } else { 
                    if (char === '"') inQuotes = true; 
                    else if (char === ',') { row.push(cell.trim()); cell = ""; } 
                    else if (char === '\n' || char === '\r') { 
                        row.push(cell.trim()); 
                        if (row.length > 1 && row.some(c => c)) result.push(row); 
                        row = []; cell = ""; 
                        if (char === '\r' && next === '\n') i++; 
                    } else cell += char; 
                }
            }
            if (cell || row.length > 0) { row.push(cell.trim()); result.push(row); }
            return result;
        }

        function init() { setupEventListeners(); refreshUI(); }

        function setupEventListeners() {
            document.getElementById('csv-upload').addEventListener('change', handleFileUpload);
            document.getElementById('search-input').addEventListener('input', render);
            document.getElementById('brand-filter').addEventListener('change', render);
            document.getElementById('color-filter').addEventListener('change', render);
            document.getElementById('add-paint-form').addEventListener('submit', handleAddPaint);
            const p = document.getElementById('global-color-picker');
            p.addEventListener('change', (e) => {
                const hex = e.target.value; const key = p.getAttribute('data-target-key');
                if (key) { colorCache[key] = hex; localStorage.setItem(COLOR_CACHE_KEY, JSON.stringify(colorCache)); render(); }
            });
        }

        function toggleDrawer() { const d = document.getElementById('drawer'), o = document.getElementById('drawer-overlay'); if (d.classList.contains('closed')) { d.classList.remove('closed'); o.classList.remove('hidden'); setTimeout(() => o.classList.add('opacity-40'), 10); } else { closeDrawer(); } }
        function closeDrawer() { const d = document.getElementById('drawer'), o = document.getElementById('drawer-overlay'); d.classList.add('closed'); o.classList.remove('opacity-40'); setTimeout(() => o.classList.add('hidden'), 300); }
        
        function openAddModal() { 
            const brandList = document.getElementById('brand-list');
            const uniqueBrands = [...new Set(paints.map(p => p.brand).filter(b => b))].sort();
            brandList.innerHTML = uniqueBrands.map(b => `<option value="${b}">`).join('');
            document.getElementById('add-modal').classList.remove('hidden'); 
            closeDrawer(); 
        }
        function closeAddModal() { document.getElementById('add-modal').classList.add('hidden'); }

        function handleAddPaint(e) {
            e.preventDefault(); const fd = new FormData(e.target);
            const n = { id: Date.now(), stdColor: fd.get('stdColor').trim(), brand: fd.get('brand').trim(), series: "", code: fd.get('code').trim(), name: fd.get('name').trim(), qty: parseInt(fd.get('qty')) || 0, usage: fd.get('usage').trim(), others: "", colorFamily: fd.get('colorFamily') };
            paints.unshift(n); saveAll(); closeAddModal(); e.target.reset();
        }

        function deletePaint(id) { if (confirm("確定刪除此漆料？")) { paints = paints.filter(p => p.id !== id); saveAll(); } }
        function updateQty(id, delta) { const p = paints.find(x => x.id === id); if (p) { p.qty = Math.max(0, p.qty + delta); saveAll(); } }
        function saveAll() { localStorage.setItem(STORAGE_KEY, JSON.stringify(paints)); refreshUI(); }

        function handleFileUpload(e) {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader();
            r.onload = (ev) => {
                const rows = parseCSV(ev.target.result);
                paints = rows.slice(1).filter(cols => cols.length > 1).map(cols => {
                    const clean = (str) => (str || "").replace(/^"|"$/g, '').trim();
                    return { id: Math.random(), stdColor: clean(cols[0]), brand: clean(cols[1]) || "未知", series: clean(cols[2]), code: clean(cols[3]), name: clean(cols[4]), qty: parseInt(clean(cols[5])) || 0, usage: clean(cols[6]), others: clean(cols[7]), colorFamily: clean(cols[8]) || "其他" };
                });
                saveAll(); closeDrawer(); alert(`匯入成功！共載入 ${paints.length} 筆。`);
            };
            r.readAsText(f, document.getElementById('encoding-selector').value);
        }

        function exportCSV() {
            const h = "\ufeff標準色,廠牌,系列,編號,名稱,數量,用途,其它色號,色系\n";
            const b = paints.map(p => `"${p.stdColor}","${p.brand}","${p.series}","${p.code}","${p.name}",${p.qty},"${(p.usage||'')}","${p.others}","${p.colorFamily}"`).join("\n");
            const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([h + b], { type: "text/csv;charset=utf-8;" })); a.download = `模型漆備份.csv`; a.click();
        }

        function clearStorage() { if (confirm("確定清空所有資料嗎？")) { localStorage.removeItem(STORAGE_KEY); window.location.reload(); } }

        function refreshUI() {
            const welcome = document.getElementById('welcome-state'), main = document.getElementById('main-content');
            if (paints.length === 0) { welcome.classList.remove('hidden'); main.classList.add('hidden'); return; }
            welcome.classList.add('hidden'); main.classList.remove('hidden');
            const bs = [...new Set(paints.map(p => p.brand))].sort(), fs = [...new Set(paints.map(p => p.colorFamily))].sort();
            const bf = document.getElementById('brand-filter'), cf = document.getElementById('color-filter');
            const curB = bf.value, curC = cf.value;
            bf.innerHTML = '<option value="">所有品牌</option>'; cf.innerHTML = '<option value="">所有分類</option>';
            bs.forEach(b => bf.innerHTML += `<option value="${b}">${b}</option>`);
            fs.forEach(f => cf.innerHTML += `<option value="${f}">${f}</option>`);
            bf.value = curB; cf.value = curC;
            render();
        }

        window.pickColor = function(k) { const p = document.getElementById('global-color-picker'); p.setAttribute('data-target-key', k); p.click(); }

        function render() {
            const t = document.getElementById('search-input').value.toLowerCase();
            const bf = document.getElementById('brand-filter').value, cf = document.getElementById('color-filter').value;
            const filtered = paints.filter(p => {
                const s = `${p.brand} ${p.code} ${p.name} ${p.stdColor} ${p.usage}`.toLowerCase();
                return s.includes(t) && (!bf || p.brand === bf) && (!cf || p.colorFamily === cf);
            });
            document.getElementById('total-count').textContent = filtered.length;
            const stats = {}; filtered.forEach(p => stats[p.brand] = (stats[p.brand]||0)+1);
            document.getElementById('brand-stats').innerHTML = Object.entries(stats).sort((a,b)=>b[1]-a[1]).map(([b,c])=>`<div class="bg-white px-2 py-1 rounded-lg border border-slate-100 flex items-center gap-1 shadow-sm shrink-0 font-bold"><span class="text-[8px] text-slate-400 uppercase">${b}</span><span class="text-xs text-slate-700">${c}</span></div>`).join('');
            const g = document.getElementById('paint-grid');
            if (filtered.length === 0) { g.innerHTML = ''; document.getElementById('empty-state').classList.remove('hidden'); return; }
            document.getElementById('empty-state').classList.add('hidden');
            g.innerHTML = filtered.map(p => {
                const bk = `${p.brand}-${p.code}`, bh = colorCache[bk];
                const cleanFS = p.stdColor ? p.stdColor.split(/[\n\r]+/)[0].replace(/\s+/g, '').toUpperCase() : '';
                const fh = colorCache[cleanFS];
                return `
                <div class="paint-card bg-white rounded-2xl border border-slate-200 p-3.5 flex flex-col shadow-sm relative overflow-hidden">
                    <button onclick="deletePaint(${p.id})" class="absolute top-2 right-2 text-slate-300 hover:text-red-500 font-bold p-1">✕</button>
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex-1">
                            <div class="flex items-center gap-1.5 mb-1">
                                <span class="text-[9px] font-black bg-slate-800 text-white px-1.5 py-0.5 rounded uppercase tracking-tighter">${p.brand}</span>
                                <span class="tag-${p.colorFamily} px-2 py-0.5 rounded-full text-[9px] font-black shadow-sm">${p.colorFamily}</span>
                            </div>
                            <div class="flex items-center">
                                <h3 class="text-lg font-black text-slate-800 leading-none">${p.code}</h3>
                                <span class="brand-swatch" style="background-color: ${bh || '#f8fafc'}" onclick="pickColor('${bk}')" title="點擊修改顏色">${bh ? '' : '+'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <p class="text-slate-600 text-sm font-bold leading-snug mb-1.5">${p.name}</p>
                        ${p.usage ? `<p class="text-[11px] text-slate-400 line-clamp-1 italic font-medium"># ${p.usage}</p>` : ''}
                    </div>
                    <div class="space-y-2 mt-auto">
                        ${p.stdColor ? `<div class="bg-slate-50 p-2 rounded-lg flex items-center justify-between border border-slate-100"><div class="flex items-center gap-2"><span class="text-[9px] text-slate-400 font-bold uppercase">FS</span><span class="text-[11px] text-slate-700 font-mono font-bold">${cleanFS}</span></div><span class="fs-swatch" style="background-color: ${fh || '#f1f5f9'}" onclick="pickColor('${cleanFS}')" title="點擊修改顏色"></span></div>` : ''}
                        <div class="flex items-center justify-between">
                            <div class="flex items-center bg-slate-100 rounded-lg p-0.5">
                                <button onclick="updateQty(${p.id}, -1)" class="w-8 h-8 rounded-md bg-white shadow-sm font-bold active:bg-red-50">-</button>
                                <span class="px-3 font-black text-slate-700 text-sm min-w-[32px] text-center">${p.qty}</span>
                                <button onclick="updateQty(${p.id}, 1)" class="w-8 h-8 rounded-md bg-white shadow-sm font-bold active:bg-green-50">+</button>
                            </div>
                            <span class="text-[9px] text-slate-300 font-mono font-bold">${p.others ? 'REF: ' + p.others : ''}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
        init();
    </script>
