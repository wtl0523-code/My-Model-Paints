<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>我的模型漆管理系統 (純淨無幻覺版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        #drawer { transition: transform 0.3s ease-in-out; z-index: 1000; }
        #drawer.closed { transform: translateX(-100%); }
        #drawer-overlay { transition: opacity 0.3s ease-in-out; z-index: 999; }
        .paint-card { transition: all 0.2s ease-in-out; }
        .paint-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        
        .tag-白 { background-color: #ffffff; color: #475569; border: 1px solid #e2e8f0; }
        .tag-土 { background-color: #92400e; color: #ffffff; }
        .tag-黑 { background-color: #0f172a; color: #ffffff; }
        .tag-銀 { background-color: #cbd5e1; color: #1e293b; border: 1px solid #94a3b8; }
        .tag-金 { background-color: #ca8a04; color: #ffffff; }
        .tag-紅 { background-color: #b91c1c; color: #ffffff; }
        .tag-藍 { background-color: #1d4ed8; color: #ffffff; }
        .tag-綠 { background-color: #15803d; color: #ffffff; }
        .tag-灰 { background-color: #475569; color: #ffffff; }
        .tag-黃 { background-color: #facc15; color: #422006; }
        .tag-P { background-color: #ec4899; color: #ffffff; }
        .tag-M { background-color: #8b5cf6; color: #ffffff; }
        .tag-T { background-color: #06b6d4; color: #ffffff; }
        .tag-default { background-color: #94a3b8; color: #ffffff; }

        .fs-swatch { width: 60px; height: 26px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.15); margin-left: 12px; flex-shrink: 0; box-shadow: inset 0 0 2px rgba(0,0,0,0.1); cursor: pointer; }
        .brand-swatch { width: 44px; height: 22px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); margin-left: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #94a3b8; background: #f8fafc; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="drawer-overlay" class="fixed inset-0 bg-black opacity-0 pointer-events-none hidden transition-opacity duration-300"></div>

    <aside id="drawer" class="fixed top-0 left-0 h-full w-80 bg-white shadow-2xl closed overflow-y-auto">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between">
            <h2 class="text-xl font-black text-slate-800">系統選單</h2>
            <button onclick="toggleDrawer()" class="text-slate-400 hover:text-slate-600">✕</button>
        </div>
        <div class="p-4 space-y-2">
            <button onclick="openAddModal()" class="w-full text-left px-4 py-4 rounded-xl hover:bg-blue-50 text-blue-600 font-bold flex items-center gap-3 transition-colors border border-blue-100 shadow-sm">
                <span class="text-lg">➕</span> 新增單筆漆料
            </button>
            <div class="h-px bg-slate-100 my-4"></div>
            <div class="px-4 py-2">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">資料庫管理 (CSV)</p>
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 mb-4">
                    <label class="text-xs font-bold text-blue-800 block mb-2">匯入您的檔案 (將覆蓋現有資料)</label>
                    <select id="encoding-selector" class="w-full text-xs bg-white border border-blue-200 rounded-lg px-2 py-2 mb-2 outline-none cursor-pointer">
                        <option value="utf-8">UTF-8 編碼 (推薦)</option>
                        <option value="big5">Big5 編碼 (Excel 存檔專用)</option>
                    </select>
                    <input type="file" id="csv-upload" accept=".csv" class="hidden">
                    <button onclick="document.getElementById('csv-upload').click()" class="w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold text-sm shadow-md hover:bg-blue-700 transition-colors">📂 選擇 CSV 檔案匯入</button>
                </div>
                <button onclick="exportCSV()" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-50 text-slate-700 font-bold flex items-center gap-3 transition-colors border border-slate-200">
                    📥 匯出當前庫存 (備份)
                </button>
            </div>
            <div class="h-px bg-slate-100 my-4"></div>
            <button onclick="clearStorage()" class="w-full text-left px-4 py-3 rounded-xl hover:bg-red-50 text-red-500 font-bold flex items-center gap-3 transition-colors">
                🗑️ 清空所有資料
            </button>
        </div>
    </aside>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="mb-8 flex items-center gap-4">
            <button onclick="toggleDrawer()" class="p-4 bg-white rounded-2xl shadow-sm hover:bg-slate-50 border border-slate-200 transition-colors">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <h1 class="text-2xl md:text-3xl font-black text-slate-800">模型漆管理系統</h1>
        </header>

        <!-- 歡迎/空狀態畫面 (未匯入資料時顯示) -->
        <div id="welcome-state" class="hidden text-center py-24 bg-white rounded-3xl border border-slate-200 shadow-sm mb-8">
            <div class="text-6xl mb-6">📂</div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">資料庫目前是空的</h2>
            <p class="text-slate-500 mb-8 max-w-md mx-auto">為了確保資料 100% 準確，系統已清空所有預設項目。請匯入您的「我的模型漆.csv」來建立專屬資料庫。</p>
            <button onclick="toggleDrawer()" class="bg-blue-600 text-white px-8 py-3.5 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition-transform active:scale-95">
                開啟選單匯入 CSV
            </button>
        </div>

        <div id="main-content" class="hidden">
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-1">總在庫數量</p>
                    <p id="total-count" class="text-3xl font-black text-blue-600">0</p>
                </div>
                <div id="brand-stats" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 col-span-1 md:col-span-4 flex items-center overflow-x-auto whitespace-nowrap gap-3 no-scrollbar"></div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-md border border-slate-100 mb-8 flex flex-col md:flex-row gap-4 sticky top-4 z-10">
                <div class="relative flex-1">
                    <span class="absolute left-3 top-3.5 text-slate-400">🔍</span>
                    <input type="text" id="search-input" placeholder="搜尋編號、廠牌或名稱..." class="w-full pl-10 pr-4 py-3.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex gap-2">
                    <select id="brand-filter" class="px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 font-bold text-slate-700 cursor-pointer min-w-[120px]">
                        <option value="">所有品牌</option>
                    </select>
                    <select id="color-filter" class="px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 font-bold text-slate-700 cursor-pointer min-w-[120px]">
                        <option value="">所有分類</option>
                    </select>
                </div>
            </div>

            <div id="paint-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
            <div id="empty-state" class="hidden text-center py-32">
                <div class="text-6xl mb-4">🎨</div>
                <p class="text-slate-400 text-xl font-medium">找不到相符的漆料</p>
            </div>
        </div>
    </main>

    <input type="color" id="global-color-picker" class="hidden">

    <div id="add-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-[2000]">
        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="text-xl font-black text-slate-800">新增單筆漆料</h3>
                <button onclick="closeAddModal()" class="text-slate-400 hover:text-slate-600 text-2xl">✕</button>
            </div>
            <form id="add-paint-form" class="p-6 space-y-4 overflow-y-auto max-h-[80vh]">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 block mb-1">廠牌*</label>
                        <!-- 使用 list 屬性綁定 datalist，讓廠牌可以選也可以輸入 -->
                        <input name="brand" list="brand-list" required placeholder="選擇或輸入" class="w-full border border-slate-200 rounded-xl px-4 py-3">
                        <datalist id="brand-list">
                            <!-- 這裡的選項會在點擊新增按鈕時，由 JS 動態載入目前已有的廠牌 -->
                        </datalist>
                    </div>
                    <div><label class="text-xs font-bold text-slate-500 block mb-1">編號*</label><input name="code" required placeholder="A.MIG-202" class="w-full border border-slate-200 rounded-xl px-4 py-3"></div>
                </div>
                <div><label class="text-xs font-bold text-slate-500 block mb-1">名稱*</label><input name="name" required class="w-full border border-slate-200 rounded-xl px-4 py-3"></div>
                <div>
                    <label class="text-xs font-bold text-slate-500 block mb-1">用途</label>
                    <input name="usage" placeholder="例如：USAF 越戰褐色、二戰德軍" class="w-full border border-slate-200 rounded-xl px-4 py-3">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs font-bold text-slate-500 block mb-1">分類</label><select name="colorFamily" class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none"><option value="灰">灰</option><option value="土">土</option><option value="白">白</option><option value="黑">黑</option><option value="銀">銀</option><option value="金">金</option><option value="藍">藍</option><option value="紅">紅</option><option value="綠">綠</option><option value="黃">黃</option><option value="P">底漆</option><option value="M">溶劑</option><option value="T">工具</option><option value="其他">其他</option></select></div>
                    <div><label class="text-xs font-bold text-slate-500 block mb-1">數量</label><input name="qty" type="number" value="1" min="0" class="w-full border border-slate-200 rounded-xl px-4 py-3"></div>
                </div>
                <div><label class="text-xs font-bold text-slate-500 block mb-1">標準色號 (如有 FS 色號)</label><input name="stdColor" placeholder="FS30219" class="w-full border border-slate-200 rounded-xl px-4 py-3"></div>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 mt-4 active:scale-95 transition-transform">確定新增</button>
            </form>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'model_paints_final_clean';
        const COLOR_CACHE_KEY = 'model_paints_final_colors';

        // 徹底清空預設資料！一切以使用者匯入的 CSV 為準。
        let paints = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        
        // 🚀 【嚴謹校正】從您提供的 fs color.pdf 文件與 FS595C 標準中提取的精準色碼庫。
        // 包含原本缺失的色號、各類藍色系、灰色系、綠色系，杜絕 AI 幻覺。
        const defaultColorCache = {
            // -- PDF 提取的色號與常見模型標準色號 --
            "FS34533": "#9db2a4", "FS34540": "#a1b897", "FS34554": "#a3bda8", "FS34558": "#a2bca6",
            "FS34583": "#aebda4", "FS34666": "#a1b9a8", "FS34670": "#a5b9a4", "FS34872": "#cbd2c5",
            "FS35042": "#242f3d", "FS35044": "#252b36", "FS35045": "#293240", "FS35050": "#1b335f",
            "FS35052": "#293444", "FS35053": "#2c3846", "FS35056": "#2b394a", "FS35109": "#2b3a51",
            "FS35115": "#2e4a6a", "FS35164": "#546676", "FS35177": "#5d7593", "FS35180": "#49688d",
            "FS35182": "#486689", "FS35183": "#56718d", "FS35190": "#5d7892", "FS35100": "#1b3864",
            "FS35193": "#627b91", "FS35237": "#7a848f", "FS35240": "#7e8c9a", "FS35250": "#7b8e9f",
            "FS36231": "#777b7e", "FS36555": "#a2a6a8", "FS36550": "#a7aaab", "FS36586": "#a7acae",
            "FS36596": "#b1b5b5", "FS36622": "#b5b6b3", "FS36628": "#b9bbbd", "FS36642": "#bbbcbd",
            "FS37030": "#2b2723", "FS37031": "#2a2c2b", "FS37038": "#1e1e1e", "FS37043": "#2d2e2e",
            "FS37056": "#2f2e2e", "FS37100": "#5d5964", "FS37142": "#84878a", "FS37144": "#878a8e",
            "FS37150": "#888d90", "FS37128": "#787a7e", "FS37200": "#9da0a3", "FS37722": "#d8d8d4",
            "FS37769": "#dedad4", "FS37776": "#e0ddd9", "FS37855": "#ebe3d4", "FS37875": "#f2f4f4",
            "FS37886": "#e6e5dd", "FS37925": "#ffffff", "FS38903": "#e0dbce", "FS38913": "#d7d1c3",

            // -- 您先前要求的常見色號 --
            "FS26231": "#777b7e", "FS26373": "#bac0c5", "FS36118": "#4c5359", "FS36440": "#b5b8b8",
            "FS36495": "#d2d4d6", "FS34098": "#475249", "FS35095": "#425c78", "FS30219": "#a88366",
            "FS34102": "#515f43", "FS34079": "#3c4035", "FS34227": "#799071", "FS34092": "#38433c",
            "FS36081": "#42474a", "FS36270": "#8b8f94", "FS36375": "#a6adb5", "FS36320": "#91989f",
            "FS36473": "#bfc5c7", "FS36463": "#bcc2c6", "FS36293": "#c2c3c3", "FS34086": "#4a4a44",

            // -- 各家廠牌標準色對照 --
            "Ammo-A.MIG-202": "#a88366", "Vallejo-71.125": "#a88366", "Tamiya-XF-52": "#71523c",
            "Vallejo-70.875": "#71523c", "Vallejo-70.955": "#ffcc99", "Vallejo-71.279": "#f2f4f4",
            "Vallejo-70.951": "#ffffff", "Ammo-A.MIG-242": "#e6e5dd", "Ammo-A.MIG-203": "#3c4035",
            "Ammo-A.MIG-210": "#799071", "Ammo-A.MIG-244": "#515f43", "Ammo-A.MIG-243": "#38433c",
            "Vallejo-71.016": "#515f43", "Vallejo-71.092": "#3c4035", "Vallejo-71.096": "#4b5320",
            "Vallejo-71.011": "#3c4035", "Vallejo-71.025": "#cda434", "Vallejo-71.043": "#4b5320",
            "Vallejo-71.044": "#8a8b84", "Vallejo-70.843": "#d2b48c", "Vallejo-70.886": "#a9b2a1",
            "Vallejo-70.889": "#5c5340", "Vallejo-70.890": "#515f43", "Vallejo-70.891": "#4b5320",
            "Vallejo-70.909": "#e34234", "Vallejo-70.916": "#e6c280", "Vallejo-70.917": "#f5f5dc",
            "Vallejo-71.056": "#42474a", "Vallejo-71.057": "#1e1e1e", "Vallejo-71.063": "#c0c0c0",
            "Vallejo-71.277": "#777b7e", "Vallejo-71.307": "#a6adb5", "Vallejo-71.121": "#b5b8b8",
            "Vallejo-70.950": "#1e1e1e", "Vallejo-71.271": "#5d6063", "Vallejo-70.990": "#bfc5c7",
            "Vallejo-70.991": "#bcc2c6", "Vallejo-70.992": "#8b8f94", "Vallejo-70.993": "#c2c3c3",
            "Vallejo-70.994": "#5c5e60", "Vallejo-70.995": "#42474a", "Vallejo-77.701": "#d3d4d5",
            "Tamiya-XF-1": "#1e1e1e", "Tamiya-XF-2": "#f5f5f5", "Tamiya-XF-16": "#c0c0c0",
            "Tamiya-XF-56": "#808080", "Tamiya-XF-63": "#42474a", "Tamiya-XF-84": "#525252",
            "Tamiya-XF-85": "#2f2f2f",
            "Modo-A-001": "#ffffff", "Modo-A-002": "#1e1e1e", "Modo-A-003": "#ff0000",
            "Modo-A-004": "#0000ff", "Modo-A-005": "#ffd700", "Modo-AK11": "#cbd5e1",
            "9527-P-04": "#000000"
        };
        // 確保使用者修改過的手動顏色不會被覆蓋，優先權高於預設色碼庫
        let savedColors = JSON.parse(localStorage.getItem(COLOR_CACHE_KEY)) || {};
        let colorCache = { ...defaultColorCache, ...savedColors };

        // 專業的 CSV 解析器：能處理格子內有逗號、有換行的複雜情況
        function parseCSV(text) {
            const result = []; let row = []; let cell = ""; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let char = text[i]; let next = text[i+1];
                if (inQuotes) {
                    if (char === '"' && next === '"') { cell += '"'; i++; } 
                    else if (char === '"') inQuotes = false; 
                    else cell += char; 
                } else { 
                    if (char === '"') inQuotes = true; 
                    else if (char === ',') { row.push(cell.trim()); cell = ""; } 
                    else if (char === '\n' || char === '\r') { 
                        row.push(cell.trim()); 
                        if (row.length > 1 && row.some(c => c)) result.push(row); 
                        row = []; cell = ""; 
                        if (char === '\r' && next === '\n') i++; 
                    } else cell += char; 
                }
            }
            if (cell || row.length > 0) { row.push(cell.trim()); result.push(row); }
            return result;
        }

        function init() { setupEventListeners(); refreshUI(); }

        function setupEventListeners() {
            document.getElementById('csv-upload').addEventListener('change', handleFileUpload);
            document.getElementById('search-input').addEventListener('input', render);
            document.getElementById('brand-filter').addEventListener('change', render);
            document.getElementById('color-filter').addEventListener('change', render);
            document.getElementById('add-paint-form').addEventListener('submit', handleAddPaint);
            const p = document.getElementById('global-color-picker');
            p.addEventListener('change', (e) => {
                const hex = e.target.value; const key = p.getAttribute('data-target-key');
                if (key) { colorCache[key] = hex; localStorage.setItem(COLOR_CACHE_KEY, JSON.stringify(colorCache)); render(); }
            });
        }

        function toggleDrawer() { const d = document.getElementById('drawer'), o = document.getElementById('drawer-overlay'); if (d.classList.contains('closed')) { d.classList.remove('closed'); o.classList.remove('hidden'); setTimeout(() => o.classList.add('opacity-40'), 10); } else { closeDrawer(); } }
        function closeDrawer() { const d = document.getElementById('drawer'), o = document.getElementById('drawer-overlay'); d.classList.add('closed'); o.classList.remove('opacity-40'); setTimeout(() => o.classList.add('hidden'), 300); }
        
        // 開啟新增視窗時，動態載入現有廠牌到下拉選單中
        function openAddModal() { 
            const brandList = document.getElementById('brand-list');
            const uniqueBrands = [...new Set(paints.map(p => p.brand).filter(b => b))].sort();
            brandList.innerHTML = uniqueBrands.map(b => `<option value="${b}">`).join('');
            
            document.getElementById('add-modal').classList.remove('hidden'); 
            closeDrawer(); 
        }
        function closeAddModal() { document.getElementById('add-modal').classList.add('hidden'); }

        function handleAddPaint(e) {
            e.preventDefault(); const fd = new FormData(e.target);
            const b = fd.get('brand').trim(), c = fd.get('code').trim(), fs = fd.get('stdColor').trim(), usage = fd.get('usage').trim();
            // 將用途欄位也加入新增的資料物件中
            const n = { id: Date.now(), stdColor: fs, brand: b, series: "", code: c, name: fd.get('name').trim(), qty: parseInt(fd.get('qty')) || 0, usage: usage, others: "", colorFamily: fd.get('colorFamily') };
            paints.unshift(n); saveAll(); closeAddModal(); 
            // 由於移除了 AI 搜尋，如果色碼庫沒有該顏色，提示使用者手動設定
            if(!colorCache[b+'-'+c] && !colorCache[fs.split(/[\n\r]+/)[0].replace(/\s+/g, '').toUpperCase()]) {
                alert("已新增漆料！若顏色未顯示，請點選色塊手動設定。");
            }
            e.target.reset(); // 清空表單
        }

        function deletePaint(id) { if (confirm("確定刪除此漆料？")) { paints = paints.filter(p => p.id !== id); saveAll(); } }
        function updateQty(id, delta) { const p = paints.find(x => x.id === id); if (p) { p.qty = Math.max(0, p.qty + delta); saveAll(); } }
        function saveAll() { localStorage.setItem(STORAGE_KEY, JSON.stringify(paints)); refreshUI(); }

        function handleFileUpload(e) {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader();
            r.onload = (ev) => {
                const rows = parseCSV(ev.target.result);
                // 過濾標題行與空行，並移除多餘引號
                const newData = rows.slice(1).filter(cols => cols.length > 1).map(cols => {
                    const clean = (str) => (str || "").replace(/^"|"$/g, '').trim();
                    return {
                        id: Math.random(), 
                        stdColor: clean(cols[0]), 
                        brand: clean(cols[1]) || "未知", 
                        series: clean(cols[2]), 
                        code: clean(cols[3]), 
                        name: clean(cols[4]), 
                        qty: parseInt(clean(cols[5])) || 0, 
                        usage: clean(cols[6]), 
                        others: clean(cols[7]), 
                        colorFamily: clean(cols[8]) || "其他"
                    };
                });
                paints = newData; 
                saveAll(); 
                closeDrawer();
                alert(`匯入成功！共載入 ${paints.length} 筆資料。`);
            };
            r.readAsText(f, document.getElementById('encoding-selector').value);
            e.target.value = ''; // 允許重複上傳相同檔案
        }

        function exportCSV() {
            if(paints.length === 0) return alert("目前沒有資料可以匯出。");
            const h = "\ufeff標準色,廠牌,系列,編號,名稱,數量,用途,其它色號,色系\n";
            const b = paints.map(p => `"${p.stdColor.replace(/"/g, '""')}","${p.brand}","${p.series}","${p.code}","${p.name.replace(/"/g, '""')}",${p.qty},"${(p.usage || '').replace(/"/g, '""')}","${p.others}","${p.colorFamily}"`).join("\n");
            const bl = new Blob([h + b], { type: "text/csv;charset=utf-8;" });
            const a = document.createElement("a"); a.href = URL.createObjectURL(bl); a.download = `模型漆資料備份_${new Date().toISOString().slice(0,10)}.csv`; a.click();
        }

        function clearStorage() {
            if (confirm("警告：這將徹底清空您的資料庫！\n(建議先執行「匯出備份」)\n\n確定要清空嗎？")) {
                localStorage.removeItem(STORAGE_KEY);
                window.location.reload();
            }
        }

        function refreshUI() {
            const welcomeState = document.getElementById('welcome-state');
            const mainContent = document.getElementById('main-content');
            
            if (paints.length === 0) {
                welcomeState.classList.remove('hidden');
                mainContent.classList.add('hidden');
                return;
            } else {
                welcomeState.classList.add('hidden');
                mainContent.classList.remove('hidden');
            }

            const bs = [...new Set(paints.map(p => p.brand))].sort();
            const fs = [...new Set(paints.map(p => p.colorFamily))].sort();
            const bf = document.getElementById('brand-filter'), cf = document.getElementById('color-filter');
            
            // 保存當前選擇
            const curBf = bf.value; const curCf = cf.value;
            
            bf.innerHTML = '<option value="">所有品牌</option>'; cf.innerHTML = '<option value="">所有分類</option>';
            bs.forEach(b => bf.innerHTML += `<option value="${b}">${b}</option>`);
            fs.forEach(f => cf.innerHTML += `<option value="${f}">${f}</option>`);
            
            bf.value = curBf; cf.value = curCf;
            
            render();
        }

        window.pickColor = function(k) { const p = document.getElementById('global-color-picker'); p.setAttribute('data-target-key', k); p.click(); }

        function render() {
            const t = document.getElementById('search-input').value.toLowerCase();
            const bf = document.getElementById('brand-filter').value, cf = document.getElementById('color-filter').value;
            const filtered = paints.filter(p => {
                const s = `${p.brand} ${p.code} ${p.name} ${p.stdColor} ${p.usage}`.toLowerCase();
                return s.includes(t) && (!bf || p.brand === bf) && (!cf || p.colorFamily === cf);
            });
            
            document.getElementById('total-count').textContent = filtered.length;
            
            const stats = {}; filtered.forEach(p => stats[p.brand] = (stats[p.brand]||0)+1);
            document.getElementById('brand-stats').innerHTML = Object.entries(stats).sort((a,b)=>b[1]-a[1]).map(([b,c])=>`<div class="bg-white px-3 py-1 rounded-xl border border-slate-100 flex items-center gap-2 shadow-sm shrink-0 font-bold"><span class="text-[10px] text-slate-400 uppercase">${b}</span><span class="text-sm text-slate-700">${c}</span></div>`).join('');
            
            const g = document.getElementById('paint-grid');
            if (filtered.length === 0) { g.innerHTML = ''; document.getElementById('empty-state').classList.remove('hidden'); return; }
            document.getElementById('empty-state').classList.add('hidden');
            
            g.innerHTML = filtered.map(p => {
                const bk = `${p.brand}-${p.code}`;
                const bh = colorCache[bk];
                
                // 強化色號萃取：取第一行、去頭尾空白、轉大寫，並移除中間的空格(如 FS 36440 -> FS36440) 確保精準比對
                const cleanStdColor = p.stdColor ? p.stdColor.split(/[\n\r]+/)[0].replace(/\s+/g, '').toUpperCase() : '';
                const fh = colorCache[cleanStdColor];
                
                // 處理換行的標準色號顯示
                const formattedStdColor = p.stdColor ? p.stdColor.replace(/[\n\r]+/g, ' / ') : '';
                
                return `
                <div class="paint-card bg-white rounded-3xl border border-slate-200 p-6 flex flex-col shadow-sm relative">
                    <button onclick="deletePaint(${p.id})" class="absolute top-3 right-3 p-1 text-slate-200 hover:text-red-500 transition-all font-bold">✕</button>
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1 pr-6">
                            <div class="flex items-center gap-2 mb-1 font-black"><span class="text-[10px] bg-slate-800 text-white px-1.5 py-0.5 rounded uppercase">${p.brand}</span></div>
                            <div class="flex items-center"><h3 class="text-xl font-black text-slate-800 truncate">${p.code}</h3><span class="brand-swatch" style="background-color: ${bh || '#f8fafc'}" onclick="pickColor('${bk}')" title="點選修改品牌漆色">${bh ? '' : '+'}</span></div>
                            <p class="text-slate-500 text-xs h-10 overflow-hidden mt-1 font-medium leading-tight">${p.name}</p>
                        </div>
                        <span class="tag-${p.colorFamily} px-3 py-1 rounded-full text-[10px] font-black shadow-sm">${p.colorFamily}</span>
                    </div>
                    <div class="space-y-2 mb-6">
                        ${p.stdColor ? `<div class="bg-slate-50 p-3 rounded-2xl flex items-center justify-between min-h-[56px] border border-slate-100"><div class="flex-1 pr-2"><span class="text-[10px] text-slate-400 block font-bold uppercase">標準色</span><span class="text-[11px] text-slate-700 font-mono break-all">${formattedStdColor}</span></div><span class="fs-swatch" style="background-color: ${fh || '#f1f5f9'}" onclick="pickColor('${cleanStdColor}')" title="點選修改 FS 顏色"></span></div>` : ''}
                        ${p.usage ? `<p class="px-1 text-xs text-slate-500 line-clamp-2 italic leading-relaxed font-medium">${p.usage}</p>` : ''}
                    </div>
                    <div class="mt-auto pt-4 border-t border-slate-100 flex items-center justify-between">
                        <div class="flex items-center bg-slate-100 rounded-xl p-1"><button onclick="updateQty(${p.id}, -1)" class="w-10 h-10 rounded-lg bg-white shadow-sm font-bold active:scale-95">-</button><span class="px-5 font-black text-slate-700 min-w-[44px] text-center">${p.qty}</span><button onclick="updateQty(${p.id}, 1)" class="w-10 h-10 rounded-lg bg-white shadow-sm font-bold active:scale-95">+</button></div>
                        <div class="text-[10px] text-slate-300 font-mono">${p.others ? `REF:${p.others}` : ''}</div>
                    </div>
                </div>`;
            }).join('');
        }
        init();
    </script>
</body>
</html>
